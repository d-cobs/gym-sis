<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM SIS">
<meta name="theme-color" content="#050a05">
<title>GYM SIS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050a05;
  --dark: #070d07;
  --surface: #0a1a0a;
  --surface2: #0d2e0d;
  --border: #1a3a1a;
  --border2: #1f5c1f;
  --green: #4ade80;
  --green-dim: #2d6b2d;
  --text: #c8f0c8;
  --text-dim: #a3f0a3;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--black); overflow: hidden; }
body { color: var(--text); font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; align-items: center; }
#app { width: 100%; max-width: 680px; height: 100%; display: flex; flex-direction: column; padding-top: var(--safe-top); }

header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--black); flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.15em; color: var(--green); text-shadow: 0 0 30px rgba(74,222,128,0.4); line-height: 1; }
.logo-sub { font-size: 8px; color: var(--green-dim); letter-spacing: 0.35em; text-transform: uppercase; margin-top: 3px; }

.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--dark); flex-shrink: 0; }
.tab-btn { flex: 1; padding: 11px 6px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; color: var(--green-dim); transition: all 0.15s; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.hidden { display: none !important; }

.btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--green); padding: 10px 18px; border-radius: 6px; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; -webkit-appearance: none; display: inline-block; }
.btn:hover { background: #1a3a1a; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-ghost { background: none; border-color: var(--border); color: var(--text-dim); }

/* Program panel */
#program-panel { padding: 16px 0 100px; }
.section { padding: 0 16px 14px; }
.section-label { font-size: 9px; color: var(--green); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 10px; }
.week-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: var(--green); margin-bottom: 12px; }

.day-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.day-chip { padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--green-dim); font-family: 'Share Tech Mono', monospace; transition: all 0.15s; user-select: none; }
.day-chip.on { background: var(--surface2); border-color: var(--green); color: var(--green); }

.gen-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }

/* Workout cards */
.workout-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin: 0 16px 14px; overflow: hidden; animation: fadeIn 0.25s ease; }
.wcard-head { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.wcard-head:active { background: #0d1f0d; }
.wcard-day { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.1em; color: var(--green); }
.wcard-focus { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.wcard-meta { text-align: right; font-size: 10px; color: var(--green-dim); line-height: 1.8; }
.wcard-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }

.ss-block { margin-top: 14px; }
.ss-label { display: inline-block; font-size: 9px; color: var(--green); letter-spacing: 0.3em; background: var(--surface2); padding: 3px 10px; border-radius: 4px; margin-bottom: 10px; }

.ex-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ex-row:last-child { border-bottom: none; }
.ex-emoji { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; padding-top: 2px; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; color: var(--text); margin-bottom: 3px; font-weight: bold; }
.ex-timing { font-size: 11px; color: var(--green-dim); letter-spacing: 0.05em; margin-bottom: 5px; }
.ex-cue { font-size: 12px; color: var(--text-dim); line-height: 1.55; margin-bottom: 8px; }
.ex-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.demo-btn { font-size: 11px; color: var(--green); text-decoration: none; border: 1px solid var(--border2); padding: 4px 10px; border-radius: 4px; white-space: nowrap; }
.weight-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
.weight-field { display: flex; align-items: center; gap: 5px; }
.weight-input { width: 58px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 13px; outline: none; -webkit-appearance: none; }
.weight-input:focus { border-color: var(--green); }
.weight-unit { font-size: 11px; color: var(--green-dim); }

.shuffle-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
.shuffle-label { font-size: 10px; color: var(--green-dim); flex-shrink: 0; }
.day-pill { padding: 5px 10px; border-radius: 12px; font-size: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--green-dim); font-family: 'Share Tech Mono', monospace; transition: all 0.15s; }
.day-pill.active { border-color: var(--green); color: var(--green); background: var(--surface2); }

.log-btn-row { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }

/* Loading */
.loading-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin: 0 16px 14px; padding: 24px 16px; text-align: center; }
.dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
.dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:1;}30%{transform:translateY(-8px);opacity:0.5;} }
.loading-text { font-size: 11px; color: var(--green-dim); letter-spacing: 0.15em; }

/* Empty */
.empty { padding: 48px 24px; text-align: center; color: var(--green-dim); }
.empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty-h { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.15em; color: var(--green); text-shadow: 0 0 20px rgba(74,222,128,0.3); margin-bottom: 10px; }
.empty-p { font-size: 13px; line-height: 1.7; max-width: 260px; margin: 0 auto; }

/* Log panel */
#log-panel { padding: 16px 0 80px; }
.log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin: 0 16px 10px; padding: 12px 15px; }
.log-date { font-size: 10px; color: var(--green); letter-spacing: 0.2em; margin-bottom: 5px; }
.log-focus { font-size: 13px; color: var(--text); margin-bottom: 5px; }
.log-weights { font-size: 11px; color: var(--text-dim); line-height: 1.8; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="logo">GYM SIS</div>
      <div class="logo-sub">Personal Trainer</div>
    </div>
    <button class="btn btn-sm btn-ghost" onclick="clearAll()">↺ RESET</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-program" onclick="switchTab('program')">🏋️ PROGRAM</button>
    <button class="tab-btn" id="tab-log" onclick="switchTab('log')">📋 LOG (<span id="log-count">0</span>)</button>
  </div>

  <div id="program-panel" class="panel">
    <div class="section">
      <div class="week-title">THIS WEEK</div>
      <div class="section-label">SELECT YOUR TRAINING DAYS</div>
      <div class="day-chips" id="day-chips"></div>
      <div class="gen-bar">
        <button class="btn" id="gen-btn" onclick="generateWeek()">⚡ GENERATE WEEK</button>
        <button class="btn btn-sm btn-ghost" id="clear-btn" onclick="clearWorkouts()" style="display:none">CLEAR</button>
      </div>
    </div>
    <div id="workouts-container"></div>
  </div>

  <div id="log-panel" class="panel hidden">
    <div id="log-container"></div>
  </div>
</div>

<script>
const API_URL = 'https://gym-sis.vercel.app/api/chat';

const ALL_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const SPLITS = [
  { id:'lower',  label:'Lower Body A', emoji:'🦵', focus:'Quads, Glutes, Hamstrings' },
  { id:'push',   label:'Push',         emoji:'💪', focus:'Chest, Shoulders, Triceps' },
  { id:'pull',   label:'Pull',         emoji:'🔙', focus:'Back, Biceps, Rear Delts' },
  { id:'lower2', label:'Lower Body B', emoji:'🍑', focus:'Glutes, Hamstrings, Calves' },
  { id:'full',   label:'Full Body',    emoji:'⚡', focus:'Full Body Power & Core' },
];

// ── State ──
let selectedDays = ['Monday','Wednesday','Friday','Saturday'];
let workouts = {};   // { day: workoutObj | 'loading' | 'error' }
let weights = {};    // { day: { exerciseName: { kg, lbs } } }
let workoutLog = []; // saved log entries
let openCards = {};  // { day: bool }

function load() {
  try {
    const d = localStorage.getItem('gs2-days');
    if (d) selectedDays = JSON.parse(d);
    const w = localStorage.getItem('gs2-workouts');
    if (w) workouts = JSON.parse(w);
    const wt = localStorage.getItem('gs2-weights');
    if (wt) weights = JSON.parse(wt);
    const l = localStorage.getItem('gs2-log');
    if (l) workoutLog = JSON.parse(l);
    const o = localStorage.getItem('gs2-open');
    if (o) openCards = JSON.parse(o);
  } catch(e) { console.warn('Load error', e); }
}

function save() {
  try {
    localStorage.setItem('gs2-days', JSON.stringify(selectedDays));
    // Don't save loading states
    const saveableWorkouts = {};
    Object.entries(workouts).forEach(([k,v]) => { if (v !== 'loading') saveableWorkouts[k] = v; });
    localStorage.setItem('gs2-workouts', JSON.stringify(saveableWorkouts));
    localStorage.setItem('gs2-weights', JSON.stringify(weights));
    localStorage.setItem('gs2-log', JSON.stringify(workoutLog));
    localStorage.setItem('gs2-open', JSON.stringify(openCards));
  } catch(e) { console.warn('Save error', e); }
}

// ── Day chips ──
function renderDayChips() {
  const container = document.getElementById('day-chips');
  container.innerHTML = ALL_DAYS.map(d =>
    `<div class="day-chip ${selectedDays.includes(d)?'on':''}" onclick="toggleDay('${d}')">${d.slice(0,3).toUpperCase()}</div>`
  ).join('');
}

function toggleDay(day) {
  if (selectedDays.includes(day)) {
    if (selectedDays.length <= 3) return;
    selectedDays = selectedDays.filter(d => d !== day);
  } else {
    if (selectedDays.length >= 6) return;
    selectedDays.push(day);
    selectedDays.sort((a,b) => ALL_DAYS.indexOf(a) - ALL_DAYS.indexOf(b));
  }
  save();
  renderDayChips();
}

// ── Assign splits to days ──
function getAssignments() {
  return selectedDays.map((day, i) => ({
    day,
    split: SPLITS[i % SPLITS.length]
  }));
}

// ── Generate ──
async function generateWeek() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '⏳ GENERATING...';

  // Mark all as loading
  const assignments = getAssignments();
  assignments.forEach(({day}) => { workouts[day] = 'loading'; });
  renderWorkouts();

  // Generate each workout
  for (const {day, split} of assignments) {
    try {
      const w = await fetchWorkout(day, split);
      workouts[day] = w;
      save();
      renderWorkouts();
    } catch(e) {
      workouts[day] = { error: true, focus: 'Generation failed — tap to retry', supersets: [], duration: '—', split };
      save();
      renderWorkouts();
    }
  }

  btn.disabled = false;
  btn.textContent = '⚡ REGENERATE';
  document.getElementById('clear-btn').style.display = 'inline-block';
}

async function fetchWorkout(day, split) {
  const prompt = `You are a personal trainer. Generate a ${split.label} strength workout.

REQUIREMENTS:
- Muscle focus: ${split.focus}
- Duration: 35-45 minutes
- Equipment: dumbbells, kettlebells, bench, stability ball, yoga mat ONLY — no machines, no barbell
- Structure: exactly 3 supersets, each with 2-3 exercises
- Sets per exercise: 3 sets
- Timing: each set is timed (30-45 seconds), training to failure in that time — NO rep counts
- Transitions: minimal rest between exercises in a superset (that IS the rest for the previous muscle)

For each exercise include:
- name: exercise name
- muscle: muscles worked
- emoji: one relevant emoji
- duration: "40 sec" or "35 sec" etc
- sets: "3 sets"  
- cue: 1 specific, practical form cue (1-2 sentences)
- youtube: YouTube search URL e.g. https://www.youtube.com/results?search_query=goblet+squat+tutorial

Respond with ONLY a raw JSON object, no markdown, no explanation:
{
  "focus": "${split.focus}",
  "duration": "38",
  "supersets": [
    {
      "exercises": [
        {
          "name": "Goblet Squat",
          "muscle": "Quads, Glutes",
          "emoji": "🏋️",
          "duration": "40 sec",
          "sets": "3 sets",
          "cue": "Hold kettlebell at chest, elbows inside knees at the bottom. Drive through heels and squeeze glutes at the top.",
          "youtube": "https://www.youtube.com/results?search_query=goblet+squat+form+tutorial"
        }
      ]
    }
  ]
}`;

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);

  const text = data.reply || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON returned');
  const w = JSON.parse(match[0]);
  w.split = split;
  w.assignedDay = day;
  return w;
}

// ── Render workouts ──
function renderWorkouts() {
  const container = document.getElementById('workouts-container');
  const hasAny = Object.keys(workouts).length > 0;
  document.getElementById('clear-btn').style.display = hasAny ? 'inline-block' : 'none';

  if (!hasAny) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">🏋️</div>
      <div class="empty-h">LET'S GET TO WORK</div>
      <div class="empty-p">Pick your training days above, then hit Generate Week.</div>
    </div>`;
    return;
  }

  const assignments = getAssignments();
  container.innerHTML = assignments.map(({day, split}) => {
    const w = workouts[day];
    if (!w) return '';
    if (w === 'loading') return `
      <div class="loading-card">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="loading-text">BUILDING ${split.label.toUpperCase()}...</div>
      </div>`;
    return renderCard(day, w, split);
  }).join('');
}

function renderCard(day, w, split) {
  const isOpen = openCards[day] || false;
  const displayDay = w.assignedDay || day;
  const emoji = (w.split || split).emoji;

  let html = `<div class="workout-card">
    <div class="wcard-head" onclick="toggleCard('${day}')">
      <div>
        <div class="wcard-day">${emoji} ${displayDay}</div>
        <div class="wcard-focus">${w.focus || split.focus}</div>
      </div>
      <div class="wcard-meta">
        ${w.duration ? w.duration + ' MIN' : ''}<br>
        ${w.supersets ? w.supersets.length + ' SUPERSETS' : ''}<br>
        <span style="font-size:12px;color:var(--green)">${isOpen ? '▲' : '▼'}</span>
      </div>
    </div>`;

  if (isOpen && w.supersets && w.supersets.length > 0) {
    html += `<div class="wcard-body">`;

    w.supersets.forEach((ss, si) => {
      html += `<div class="ss-block"><span class="ss-label">⚡ SUPERSET ${si + 1}</span>`;
      ss.exercises.forEach(ex => {
        const saved = (weights[day] || {})[ex.name] || {};
        const safeKey = ex.name.replace(/[^a-zA-Z0-9]/g, '_');
        html += `<div class="ex-row">
          <div class="ex-emoji">${ex.emoji || '💪'}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-timing">${ex.duration} · ${ex.sets} · ${ex.muscle}</div>
            <div class="ex-cue">${ex.cue}</div>
            <div class="ex-actions">
              <a class="demo-btn" href="${ex.youtube}" target="_blank">▶ DEMO</a>
            </div>
            <div class="weight-row">
              <div class="weight-field">
                <input class="weight-input" type="number" inputmode="decimal" placeholder="—" step="0.5"
                  id="kg_${day}_${safeKey}"
                  value="${saved.kg || ''}"
                  onchange="setWeight('${day}','${ex.name}','kg',this.value)">
                <span class="weight-unit">kg</span>
              </div>
              <div class="weight-field">
                <input class="weight-input" type="number" inputmode="decimal" placeholder="—" step="1"
                  id="lbs_${day}_${safeKey}"
                  value="${saved.lbs || ''}"
                  onchange="setWeight('${day}','${ex.name}','lbs',this.value)">
                <span class="weight-unit">lbs</span>
              </div>
            </div>
          </div>
        </div>`;
      });
      html += `</div>`;
    });

    // Shuffle row
    html += `<div class="shuffle-row"><span class="shuffle-label">MOVE TO:</span>`;
    ALL_DAYS.forEach(d => {
      const isCurrent = displayDay === d;
      html += `<div class="day-pill ${isCurrent?'active':''}" onclick="reassign('${day}','${d}')">${d.slice(0,3).toUpperCase()}</div>`;
    });
    html += `</div>`;

    // Log button
    html += `<div class="log-btn-row">
      <button class="btn btn-sm" onclick="logWorkout('${day}')">✓ LOG WORKOUT</button>
    </div>`;

    html += `</div>`; // wcard-body
  }

  html += `</div>`; // workout-card
  return html;
}

function toggleCard(day) {
  openCards[day] = !openCards[day];
  save();
  renderWorkouts();
}

function reassign(day, newDay) {
  if (workouts[day] && workouts[day] !== 'loading') {
    workouts[day].assignedDay = newDay;
    save();
    renderWorkouts();
  }
}

function setWeight(day, exName, unit, val) {
  if (!weights[day]) weights[day] = {};
  if (!weights[day][exName]) weights[day][exName] = {};
  const num = parseFloat(val) || 0;
  if (unit === 'kg') {
    weights[day][exName].kg = num;
    weights[day][exName].lbs = Math.round(num * 2.20462 * 10) / 10;
  } else {
    weights[day][exName].lbs = num;
    weights[day][exName].kg = Math.round(num / 2.20462 * 10) / 10;
  }
  save();
  // Update the other field live
  const safeKey = exName.replace(/[^a-zA-Z0-9]/g, '_');
  const other = unit === 'kg' ? 'lbs' : 'kg';
  const el = document.getElementById(`${other}_${day}_${safeKey}`);
  if (el) el.value = weights[day][exName][other] || '';
}

function logWorkout(day) {
  const w = workouts[day];
  if (!w || w === 'loading') return;
  const dayWeights = weights[day] || {};
  const weightLines = Object.entries(dayWeights)
    .filter(([,v]) => v.kg)
    .map(([name, v]) => `${name}: ${v.kg}kg / ${v.lbs}lbs`);

  workoutLog.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }),
    day: w.assignedDay || day,
    focus: w.focus,
    duration: w.duration,
    weights: weightLines
  });
  workoutLog = workoutLog.slice(0, 100);
  save();
  renderLog();
  document.getElementById('log-count').textContent = workoutLog.length;

  // Feedback
  const btns = document.querySelectorAll('.log-btn-row .btn');
  btns.forEach(b => { if (b.onclick && b.onclick.toString().includes(day)) { b.textContent = '✓ LOGGED!'; setTimeout(() => b.textContent = '✓ LOG WORKOUT', 2000); } });
}

function renderLog() {
  const container = document.getElementById('log-container');
  document.getElementById('log-count').textContent = workoutLog.length;
  if (workoutLog.length === 0) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-h">NO LOGS YET</div>
      <div class="empty-p">Complete a workout and tap "Log Workout" to save your progress here.</div>
    </div>`;
    return;
  }
  container.innerHTML = workoutLog.map(e => `
    <div class="log-card">
      <div class="log-date">${e.date.toUpperCase()} · ${e.duration || '—'} MIN</div>
      <div class="log-focus">${e.day} — ${e.focus}</div>
      ${e.weights && e.weights.length > 0 ? `<div class="log-weights">${e.weights.join('<br>')}</div>` : ''}
    </div>
  `).join('');
}

function clearWorkouts() {
  workouts = {};
  openCards = {};
  save();
  renderWorkouts();
  document.getElementById('gen-btn').textContent = '⚡ GENERATE WEEK';
  document.getElementById('clear-btn').style.display = 'none';
}

function clearAll() {
  if (!confirm('Reset everything? This clears workouts, weights, and logs.')) return;
  workouts = {}; weights = {}; workoutLog = {}; openCards = {};
  selectedDays = ['Monday','Wednesday','Friday','Saturday'];
  workoutLog = [];
  save();
  renderDayChips();
  renderWorkouts();
  renderLog();
  document.getElementById('gen-btn').textContent = '⚡ GENERATE WEEK';
}

function switchTab(tab) {
  document.getElementById('program-panel').classList.toggle('hidden', tab !== 'program');
  document.getElementById('log-panel').classList.toggle('hidden', tab !== 'log');
  document.getElementById('tab-program').classList.toggle('active', tab === 'program');
  document.getElementById('tab-log').classList.toggle('active', tab === 'log');
}

// ── Init ──
load();
renderDayChips();
renderWorkouts();
renderLog();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
