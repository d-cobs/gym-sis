<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM SIS">
<meta name="theme-color" content="#050a05">
<title>GYM SIS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050a05;
    --dark: #070d07;
    --surface: #0a1a0a;
    --surface2: #0d2e0d;
    --border: #1a3a1a;
    --border2: #1f5c1f;
    --green: #4ade80;
    --green-dim: #2d6b2d;
    --text: #c8f0c8;
    --text-dim: #a3f0a3;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--black);
  }

  body {
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 680px;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    pointer-events: none;
    z-index: 999;
  }

  header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--black);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.15em;
    color: var(--green);
    text-shadow: 0 0 30px rgba(74,222,128,0.4);
    line-height: 1;
  }

  .logo-sub {
    font-size: 8px;
    color: var(--green-dim);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-actions { display: flex; gap: 8px; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--green);
    cursor: pointer;
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    flex-shrink: 0;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    color: var(--green-dim);
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

  #chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  .msg-wrap { display: flex; flex-direction: column; animation: fadeIn 0.2s ease; }
  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.assistant { align-items: flex-start; }

  .bubble {
    max-width: 88%;
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px 16px 4px 16px;
    color: var(--text-dim);
  }

  .bubble.assistant {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    color: var(--text);
  }

  .bubble.error { border-color: #ff4444; color: #ff8888; }

  .bubble-label {
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.2em;
    display: block;
    margin-bottom: 6px;
  }

  .msg-ts { font-size: 10px; color: var(--green-dim); margin-top: 4px; }

  .typing {
    display: flex;
    gap: 6px;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    align-self: flex-start;
    width: 60px;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:1; }
    30% { transform: translateY(-7px); opacity:0.5; }
  }

  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 20px;
    text-align: center;
    color: var(--green-dim);
  }

  .empty-icon { font-size: 48px; }

  .empty h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.2em;
    color: var(--green);
    text-shadow: 0 0 20px rgba(74,222,128,0.3);
  }

  .empty p { font-size: 13px; max-width: 260px; line-height: 1.6; }

  .prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; }

  .prompt-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--green);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .input-area {
    padding: 12px 20px;
    padding-bottom: calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--black);
    flex-shrink: 0;
  }

  #chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 11px 15px;
    border-radius: 8px;
    font-size: 16px; /* 16px prevents iOS zoom */
    font-family: 'Share Tech Mono', monospace;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 110px;
    line-height: 1.5;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  #chat-input:focus { border-color: var(--green); }
  #chat-input::placeholder { color: var(--green-dim); }

  .send-btn {
    background: var(--border2);
    border: none;
    color: var(--green);
    width: 44px;
    height: 44px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    -webkit-appearance: none;
  }

  .send-btn:disabled { opacity: 0.3; }

  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 15px;
    font-size: 13px;
    line-height: 1.6;
  }

  .workout-date {
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.25em;
    margin-bottom: 5px;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .hidden { display: none !important; }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(5px); }
    to { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="logo">GYM SIS</div>
      <div class="logo-sub">AI Personal Trainer</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()">↺ CLEAR</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">💬 CHAT</button>
    <button class="tab-btn" id="tab-log" onclick="switchTab('log')">📋 LOG (<span id="log-count">0</span>)</button>
  </div>

  <div id="chat-panel">
    <div id="messages">
      <div class="empty" id="empty-state">
        <div class="empty-icon">🏋️</div>
        <h2>HEY SIS.</h2>
        <p>Your AI trainer is ready. Ask anything about workouts, nutrition, or recovery.</p>
        <div class="prompts" id="prompt-pills"></div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="chat-input" placeholder="Ask your sis anything..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKeydown(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>▲</button>
    </div>
  </div>

  <div id="log-panel" class="hidden">
    <div class="empty hidden" id="log-empty">
      <div class="empty-icon">📋</div>
      <h2>NO LOGS YET</h2>
      <p>Tell GYM SIS what you did — workouts auto-log here.</p>
    </div>
    <div id="log-list"></div>
  </div>

</div>

<script>
  // ⚠️ UPDATE THIS after Vercel deploy
  const API_URL = 'https://gym-sis.vercel.app';

  const WORKOUT_REGEX = /\b(sets?|reps?|lbs?|kg|minutes?|workout|trained|lifted|ran|miles?|deadlift|squat|bench|press|curl|row|pull|hiit|cardio)\b/i;

  const PROMPTS = [
    "Build me a push day 💪",
    "I have 20 mins, what do I do?",
    "How do I eat to build muscle?",
    "I'm sore — what helps?",
    "Design a 3-day split for me",
  ];

  let messages = [];
  let workouts = [];
  let loading = false;

  window.addEventListener('DOMContentLoaded', () => {
    messages = JSON.parse(localStorage.getItem('gymsis-messages') || '[]');
    workouts = JSON.parse(localStorage.getItem('gymsis-workouts') || '[]');
    renderMessages();
    renderLog();
    buildPromptPills();
  });

  function buildPromptPills() {
    const container = document.getElementById('prompt-pills');
    PROMPTS.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'prompt-pill';
      btn.textContent = p;
      btn.onclick = () => { document.getElementById('chat-input').value = p; updateSendBtn(); sendMessage(); };
      container.appendChild(btn);
    });
  }

  function renderMessages() {
    const container = document.getElementById('messages');
    Array.from(container.children).forEach(c => { if (!c.id) c.remove(); });
    document.getElementById('empty-state').style.display = messages.length === 0 ? 'flex' : 'none';
    messages.forEach(m => appendBubble(m, false));
    scrollToBottom();
  }

  function appendBubble(m, animate = true) {
    document.getElementById('empty-state').style.display = 'none';
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${m.role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${m.role}${m.error ? ' error' : ''}`;
    if (m.role === 'assistant' && !m.error) {
      bubble.innerHTML = `<span class="bubble-label">GYM SIS ▸</span>${escapeHtml(m.content)}`;
    } else {
      bubble.textContent = m.content;
    }
    const ts = document.createElement('div');
    ts.className = 'msg-ts';
    ts.textContent = m.ts ? new Date(m.ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    container.appendChild(wrap);
    if (animate) scrollToBottom();
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const el = document.createElement('div');
    el.id = 'typing-indicator';
    el.className = 'typing';
    el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    container.appendChild(el);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    const c = document.getElementById('messages');
    c.scrollTop = c.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || loading) return;

    const userMsg = { role: 'user', content: text, ts: Date.now() };
    messages.push(userMsg);
    appendBubble(userMsg);
    input.value = '';
    input.style.height = 'auto';
    updateSendBtn();

    if (WORKOUT_REGEX.test(text)) {
      const w = { id: Date.now(), note: text, date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) };
      workouts.unshift(w);
      workouts = workouts.slice(0, 50);
      localStorage.setItem('gymsis-workouts', JSON.stringify(workouts));
      renderLog();
    }

    loading = true;
    updateSendBtn();
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const assistantMsg = { role: 'assistant', content: data.reply, ts: Date.now() };
      messages.push(assistantMsg);
      localStorage.setItem('gymsis-messages', JSON.stringify(messages));
      hideTyping();
      appendBubble(assistantMsg);
    } catch (e) {
      hideTyping();
      const errMsg = { role: 'assistant', content: `⚡ ${e.message}`, ts: Date.now(), error: true };
      messages.push(errMsg);
      appendBubble(errMsg);
    }

    loading = false;
    updateSendBtn();
    input.focus();
  }

  function clearChat() {
    if (!confirm('Clear chat history?')) return;
    messages = [];
    localStorage.removeItem('gymsis-messages');
    renderMessages();
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    const empty = document.getElementById('log-empty');
    document.getElementById('log-count').textContent = workouts.length;
    list.innerHTML = '';
    if (workouts.length === 0) { empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    workouts.forEach(w => {
      const card = document.createElement('div');
      card.className = 'workout-card';
      card.innerHTML = `<div class="workout-date">${w.date.toUpperCase()}</div><div>${escapeHtml(w.note)}</div>`;
      list.appendChild(card);
    });
  }

  function switchTab(tab) {
    document.getElementById('chat-panel').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('log-panel').classList.toggle('hidden', tab !== 'log');
    document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
    document.getElementById('tab-log').classList.toggle('active', tab === 'log');
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
    updateSendBtn();
  }

  function updateSendBtn() {
    document.getElementById('send-btn').disabled = loading || !document.getElementById('chat-input').value.trim();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
