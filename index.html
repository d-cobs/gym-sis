<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM SIS">
<meta name="theme-color" content="#050a05">
<title>GYM SIS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050a05;
  --dark: #070d07;
  --surface: #0a1a0a;
  --surface2: #0d2e0d;
  --border: #1a3a1a;
  --border2: #1f5c1f;
  --green: #4ade80;
  --green-mid: #22c55e;
  --green-dim: #2d6b2d;
  --text: #c8f0c8;
  --text-dim: #a3f0a3;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--black); overflow: hidden; }
body { color: var(--text); font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; align-items: center; }
#app { width: 100%; max-width: 680px; height: 100%; display: flex; flex-direction: column; padding-top: var(--safe-top); }

/* Header */
header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--black); flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.15em; color: var(--green); text-shadow: 0 0 30px rgba(74,222,128,0.4); line-height: 1; }
.logo-sub { font-size: 8px; color: var(--green-dim); letter-spacing: 0.35em; text-transform: uppercase; margin-top: 3px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--dark); flex-shrink: 0; }
.tab-btn { flex: 1; padding: 11px 6px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; color: var(--green-dim); transition: all 0.15s; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

/* Panels */
.panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.hidden { display: none !important; }

/* Buttons */
.btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--green); padding: 10px 18px; border-radius: 6px; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; -webkit-appearance: none; }
.btn:hover { background: #1a3a1a; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-ghost { background: none; border-color: var(--border); color: var(--text-dim); }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 0 16px 12px; }
.card-label { font-size: 9px; color: var(--green); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 8px; }

/* ── PROGRAM TAB ── */
#program-panel { padding: 16px 0 80px; }

.week-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 14px; }
.week-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: var(--green); }

.day-selector { display: flex; gap: 6px; padding: 0 16px 14px; flex-wrap: wrap; }
.day-chip { padding: 7px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 0.05em; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--green-dim); transition: all 0.15s; font-family: 'Share Tech Mono', monospace; }
.day-chip.selected { background: var(--surface2); border-color: var(--green); color: var(--green); }

.generate-bar { padding: 0 16px 16px; display: flex; gap: 10px; align-items: center; }

/* Workout Day Card */
.workout-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin: 0 16px 14px; overflow: hidden; }
.workout-card-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid var(--border); }
.workout-card-header:hover { background: #0d1f0d; }
.day-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.1em; color: var(--green); }
.day-focus { font-size: 11px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.05em; }
.day-meta { font-size: 10px; color: var(--green-dim); text-align: right; }
.chevron { color: var(--green-dim); font-size: 12px; transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
.workout-body { padding: 14px 16px; display: none; }
.workout-body.open { display: block; }

/* Superset block */
.superset-block { margin-bottom: 16px; }
.superset-label { font-size: 9px; color: var(--green); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 8px; padding: 4px 10px; background: var(--surface2); border-radius: 4px; display: inline-block; }
.exercise-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.exercise-row:last-child { border-bottom: none; }
.exercise-icon { font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; }
.exercise-info { flex: 1; }
.exercise-name { font-size: 14px; color: var(--text); font-weight: bold; margin-bottom: 3px; }
.exercise-detail { font-size: 11px; color: var(--green-dim); margin-bottom: 4px; letter-spacing: 0.05em; }
.exercise-cue { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 6px; }
.exercise-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.demo-link { font-size: 11px; color: var(--green); text-decoration: none; border: 1px solid var(--border2); padding: 3px 8px; border-radius: 4px; }
.weight-input-wrap { display: flex; align-items: center; gap: 6px; }
.weight-input { width: 60px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 12px; outline: none; }
.weight-input:focus { border-color: var(--green); }
.weight-unit { font-size: 11px; color: var(--green-dim); }
.weight-converted { font-size: 10px; color: var(--green-dim); margin-top: 2px; }

/* Shuffle day button */
.shuffle-wrap { display: flex; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.shuffle-label { font-size: 10px; color: var(--green-dim); letter-spacing: 0.1em; }
.day-reassign-chip { padding: 5px 10px; border-radius: 12px; font-size: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--green-dim); font-family: 'Share Tech Mono', monospace; transition: all 0.15s; }
.day-reassign-chip.current { border-color: var(--green); color: var(--green); background: var(--surface2); }

/* Loading state */
.loading-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin: 0 16px 14px; padding: 24px; text-align: center; }
.loading-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
.loading-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: bounce 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:1;}30%{transform:translateY(-8px);opacity:0.5;} }
.loading-text { font-size: 12px; color: var(--green-dim); letter-spacing: 0.15em; }

/* Empty state */
.empty-state { padding: 48px 24px; text-align: center; color: var(--green-dim); }
.empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.15em; color: var(--green); text-shadow: 0 0 20px rgba(74,222,128,0.3); margin-bottom: 10px; }
.empty-desc { font-size: 13px; line-height: 1.7; max-width: 260px; margin: 0 auto 20px; }

/* ── LOG TAB ── */
#log-panel { padding: 16px 0 80px; }
.log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin: 0 16px 10px; padding: 12px 15px; }
.log-date { font-size: 10px; color: var(--green); letter-spacing: 0.2em; margin-bottom: 6px; }
.log-focus { font-size: 13px; color: var(--text); margin-bottom: 4px; }
.log-weights { font-size: 11px; color: var(--text-dim); line-height: 1.7; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
.workout-card { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="logo">GYM SIS</div>
      <div class="logo-sub">Personal Trainer</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-sm btn-ghost" onclick="clearAll()">↺ RESET</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-program" onclick="switchTab('program')">🏋️ PROGRAM</button>
    <button class="tab-btn" id="tab-log" onclick="switchTab('log')">📋 LOG</button>
  </div>

  <!-- PROGRAM PANEL -->
  <div id="program-panel" class="panel">
    <div id="program-content">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- LOG PANEL -->
  <div id="log-panel" class="panel hidden">
    <div id="log-content">
      <!-- Filled by JS -->
    </div>
  </div>

</div>

<script>
// ⚠️ UPDATE THIS with your Vercel URL
const API_URL = 'https://gym-sis.vercel.app';

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SHORT_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const MUSCLE_GROUPS = [
  { id: 'lower', label: 'Lower Body', emoji: '🦵', focus: 'Quads, Glutes, Hamstrings' },
  { id: 'push',  label: 'Push',       emoji: '💪', focus: 'Chest, Shoulders, Triceps' },
  { id: 'pull',  label: 'Pull',       emoji: '🔙', focus: 'Back, Biceps, Rear Delts' },
  { id: 'lower2',label: 'Lower Body', emoji: '🦵', focus: 'Glutes, Hamstrings, Calves' },
  { id: 'full',  label: 'Full Body',  emoji: '⚡', focus: 'Full Body Power' },
];

// State
let selectedDays = ['Monday','Wednesday','Friday','Saturday']; // default 4 days
let workouts = {}; // { dayName: workoutData }
let weightLog = {}; // { dayName: { exerciseName: { kg, lbs } } }
let savedLog = []; // array of completed workout logs

// Load from localStorage
function loadState() {
  try {
    selectedDays = JSON.parse(localStorage.getItem('gs-days') || '["Monday","Wednesday","Friday","Saturday"]');
    workouts = JSON.parse(localStorage.getItem('gs-workouts') || '{}');
    weightLog = JSON.parse(localStorage.getItem('gs-weights') || '{}');
    savedLog = JSON.parse(localStorage.getItem('gs-log') || '[]');
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('gs-days', JSON.stringify(selectedDays));
  localStorage.setItem('gs-workouts', JSON.stringify(workouts));
  localStorage.setItem('gs-weights', JSON.stringify(weightLog));
  localStorage.setItem('gs-log', JSON.stringify(savedLog));
}

// Main render
function render() {
  renderProgram();
  renderLog();
}

function renderProgram() {
  const content = document.getElementById('program-content');
  const hasWorkouts = Object.keys(workouts).length > 0;

  let html = '';

  // Day selector
  html += `<div class="week-header">
    <div class="week-title">THIS WEEK</div>
    <div style="font-size:10px;color:var(--green-dim)">${selectedDays.length} DAYS</div>
  </div>`;

  html += `<div class="day-selector">`;
  DAYS.forEach(d => {
    const sel = selectedDays.includes(d);
    html += `<div class="day-chip ${sel?'selected':''}" onclick="toggleDay('${d}')">${d.slice(0,3)}</div>`;
  });
  html += `</div>`;

  html += `<div class="generate-bar">
    <button class="btn" onclick="generateWeek()" id="gen-btn">⚡ GENERATE WEEK</button>
    ${hasWorkouts ? `<button class="btn btn-ghost btn-sm" onclick="clearWorkouts()">CLEAR</button>` : ''}
  </div>`;

  if (!hasWorkouts) {
    html += `<div class="empty-state">
      <div class="empty-icon">🏋️</div>
      <div class="empty-title">LET'S GET TO WORK</div>
      <div class="empty-desc">Pick your training days above, then hit Generate to build your personalized superset program.</div>
    </div>`;
  } else {
    // Assign muscle groups to selected days
    const assignments = assignMuscleGroups(selectedDays);
    assignments.forEach(({ day, muscle }) => {
      const w = workouts[day];
      if (w === 'loading') {
        html += `<div class="loading-card">
          <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
          <div class="loading-text">BUILDING ${day.toUpperCase()} WORKOUT...</div>
        </div>`;
      } else if (w) {
        html += renderWorkoutCard(day, w, muscle);
      }
    });
  }

  content.innerHTML = html;
  restoreWeightInputs();
}

function assignMuscleGroups(days) {
  const groups = [...MUSCLE_GROUPS];
  return days.map((day, i) => ({
    day,
    muscle: groups[i % groups.length]
  }));
}

function renderWorkoutCard(day, workout, muscle) {
  const isOpen = workout._open || false;
  const savedDay = workout.assignedDay || day;

  let html = `<div class="workout-card" id="wcard-${day}">
    <div class="workout-card-header" onclick="toggleCard('${day}')">
      <div>
        <div class="day-name">${muscle.emoji} ${savedDay}</div>
        <div class="day-focus">${workout.focus || muscle.focus}</div>
      </div>
      <div>
        <div class="day-meta">${workout.duration || '35-40'} MIN</div>
        <div class="day-meta" style="margin-top:4px">${workout.supersets?.length || 0} SUPERSETS</div>
        <div class="chevron ${isOpen?'open'}" id="chev-${day}">▼</div>
      </div>
    </div>`;

  if (isOpen) {
    html += `<div class="workout-body open">`;

    // Supersets
    if (workout.supersets && workout.supersets.length > 0) {
      workout.supersets.forEach((ss, si) => {
        html += `<div class="superset-block">
          <span class="superset-label">⚡ SUPERSET ${si+1}</span>`;
        ss.exercises.forEach((ex, ei) => {
          const wKey = `${day}__${ex.name}`;
          const saved = (weightLog[day] || {})[ex.name] || {};
          html += `<div class="exercise-row">
            <div class="exercise-icon">${ex.emoji || '💪'}</div>
            <div class="exercise-info">
              <div class="exercise-name">${ex.name}</div>
              <div class="exercise-detail">⏱ ${ex.duration} · ${ex.sets} sets · ${ex.muscle}</div>
              <div class="exercise-cue">${ex.cue}</div>
              <div class="exercise-actions">
                <a class="demo-link" href="${ex.youtube}" target="_blank">▶ DEMO</a>
                <div class="weight-input-wrap">
                  <input class="weight-input" type="number" placeholder="0" 
                    id="w-kg-${wKey}" 
                    value="${saved.kg || ''}"
                    onchange="updateWeight('${day}','${ex.name}','kg',this.value)"
                    step="0.5">
                  <span class="weight-unit">kg</span>
                </div>
                <div class="weight-input-wrap">
                  <input class="weight-input" type="number" placeholder="0"
                    id="w-lbs-${wKey}"
                    value="${saved.lbs || ''}"
                    onchange="updateWeight('${day}','${ex.name}','lbs',this.value)"
                    step="1">
                  <span class="weight-unit">lbs</span>
                </div>
              </div>
              ${saved.kg ? `<div class="weight-converted">Last: ${saved.kg}kg / ${saved.lbs}lbs</div>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      });
    }

    // Shuffle day
    html += `<div class="shuffle-wrap">
      <span class="shuffle-label">MOVE TO:</span>`;
    DAYS.forEach(d => {
      const isCurrent = (workout.assignedDay || day) === d;
      html += `<div class="day-reassign-chip ${isCurrent?'current':''}" onclick="reassignDay('${day}','${d}')">${d.slice(0,3)}</div>`;
    });
    html += `</div>`;

    // Log workout button
    html += `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-sm" onclick="logWorkout('${day}')">✓ LOG THIS WORKOUT</button>
    </div>`;

    html += `</div>`; // workout-body
  }

  html += `</div>`; // workout-card
  return html;
}

function toggleCard(day) {
  if (workouts[day] && workouts[day] !== 'loading') {
    workouts[day]._open = !workouts[day]._open;
    saveState();
    renderProgram();
  }
}

function toggleDay(day) {
  if (selectedDays.includes(day)) {
    if (selectedDays.length <= 3) return; // min 3 days
    selectedDays = selectedDays.filter(d => d !== day);
  } else {
    if (selectedDays.length >= 6) return; // max 6 days
    selectedDays.push(day);
    selectedDays.sort((a,b) => DAYS.indexOf(a) - DAYS.indexOf(b));
  }
  saveState();
  renderProgram();
}

function reassignDay(originalDay, newDay) {
  if (workouts[originalDay]) {
    workouts[originalDay].assignedDay = newDay;
    saveState();
    renderProgram();
  }
}

function updateWeight(day, exerciseName, unit, value) {
  if (!weightLog[day]) weightLog[day] = {};
  if (!weightLog[day][exerciseName]) weightLog[day][exerciseName] = {};
  const num = parseFloat(value) || 0;
  if (unit === 'kg') {
    weightLog[day][exerciseName].kg = num;
    weightLog[day][exerciseName].lbs = Math.round(num * 2.20462 * 10) / 10;
  } else {
    weightLog[day][exerciseName].lbs = num;
    weightLog[day][exerciseName].kg = Math.round(num / 2.20462 * 10) / 10;
  }
  saveState();
  // Update the other field without full re-render
  const other = unit === 'kg' ? 'lbs' : 'kg';
  const otherVal = weightLog[day][exerciseName][other];
  const wKey = `${day}__${exerciseName}`;
  const otherInput = document.getElementById(`w-${other}-${wKey}`);
  if (otherInput) otherInput.value = otherVal || '';
}

function restoreWeightInputs() {
  // Inputs are already rendered with values from state
}

async function generateWeek() {
  if (selectedDays.length === 0) return;
  clearWorkouts(false);

  const assignments = assignMuscleGroups(selectedDays);

  // Set all to loading
  assignments.forEach(({ day }) => { workouts[day] = 'loading'; });
  renderProgram();

  // Generate each day sequentially
  for (const { day, muscle } of assignments) {
    try {
      const workout = await fetchWorkout(day, muscle);
      workouts[day] = workout;
      saveState();
      renderProgram();
    } catch(e) {
      workouts[day] = { error: true, focus: 'Error generating', supersets: [], duration: '—' };
      saveState();
      renderProgram();
    }
  }
}

async function fetchWorkout(day, muscle) {
  const prompt = `Generate a ${muscle.label} strength workout for ${day}. 

Requirements:
- Focus: ${muscle.focus}
- Duration: 35-45 minutes total
- Equipment: dumbbells, kettlebells, bench, stability ball, yoga mat ONLY
- Format: 3-4 supersets of 2-3 exercises each
- Training style: timed sets (training to failure in given time), NOT rep-based
- Set duration: 30-45 seconds per exercise
- Rest: handled by rotating through superset exercises (minimal dedicated rest)

For EACH exercise provide:
- name
- muscle targeted
- emoji (single relevant emoji)
- duration (e.g. "40 sec")  
- sets (e.g. "3 sets")
- cue: 1-2 sentence form tip (be specific and practical)
- youtube: a real YouTube search URL like https://www.youtube.com/results?search_query=dumbbell+romanian+deadlift+form

Respond ONLY with a valid JSON object exactly like this:
{
  "focus": "Quads, Glutes, Hamstrings",
  "duration": "38",
  "supersets": [
    {
      "exercises": [
        {
          "name": "Goblet Squat",
          "muscle": "Quads, Glutes",
          "emoji": "🏋️",
          "duration": "40 sec",
          "sets": "3 sets",
          "cue": "Hold kettlebell at chest. Drive knees out and sit deep, keeping chest tall. Drive through heels to stand.",
          "youtube": "https://www.youtube.com/results?search_query=goblet+squat+form+tutorial"
        }
      ]
    }
  ]
}`;

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error);

  // Parse JSON from response
  let text = data.reply;
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('No JSON in response');
  const workout = JSON.parse(jsonMatch[0]);
  workout._open = false;
  return workout;
}

function logWorkout(day) {
  const w = workouts[day];
  if (!w || w === 'loading') return;
  const weights = weightLog[day] || {};
  const entry = {
    id: Date.now(),
    date: new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }),
    day: w.assignedDay || day,
    focus: w.focus,
    duration: w.duration,
    weights: Object.entries(weights).map(([name, vals]) => `${name}: ${vals.kg}kg / ${vals.lbs}lbs`).filter(s => !s.includes('undefined'))
  };
  savedLog.unshift(entry);
  savedLog = savedLog.slice(0, 100);
  saveState();
  renderLog();
  // Brief visual feedback
  const btn = event.target;
  btn.textContent = '✓ LOGGED!';
  btn.style.borderColor = 'var(--green)';
  setTimeout(() => { btn.textContent = '✓ LOG THIS WORKOUT'; btn.style.borderColor = ''; }, 2000);
}

function renderLog() {
  const content = document.getElementById('log-content');
  if (savedLog.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">NO LOGS YET</div>
      <div class="empty-desc">Complete a workout and tap "Log This Workout" to track your progress here.</div>
    </div>`;
    return;
  }
  content.innerHTML = savedLog.map(e => `
    <div class="log-entry">
      <div class="log-date">${e.date.toUpperCase()} · ${e.duration} MIN</div>
      <div class="log-focus">${e.day} — ${e.focus}</div>
      ${e.weights.length > 0 ? `<div class="log-weights">${e.weights.join('<br>')}</div>` : ''}
    </div>
  `).join('');
}

function clearWorkouts(rerender = true) {
  workouts = {};
  saveState();
  if (rerender) renderProgram();
}

function clearAll() {
  if (!confirm('Reset everything?')) return;
  workouts = {};
  weightLog = {};
  savedLog = [];
  selectedDays = ['Monday','Wednesday','Friday','Saturday'];
  saveState();
  render();
}

function switchTab(tab) {
  document.getElementById('program-panel').classList.toggle('hidden', tab !== 'program');
  document.getElementById('log-panel').classList.toggle('hidden', tab !== 'log');
  document.getElementById('tab-program').classList.toggle('active', tab === 'program');
  document.getElementById('tab-log').classList.toggle('active', tab === 'log');
}

// Init
loadState();
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
