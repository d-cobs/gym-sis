<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM SIS">
<meta name="theme-color" content="#050a05">
<title>GYM SIS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: #050a05;
  color: #c8f0c8;
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  justify-content: center;
}
#app {
  width: 100%;
  max-width: 680px;
  min-height: 100%;
  display: flex;
  flex-direction: column;
}
header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid #1a3a1a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #050a05;
  position: sticky;
  top: 0;
  z-index: 10;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.15em; color: #4ade80; text-shadow: 0 0 30px rgba(74,222,128,0.4); }
.logo-sub { font-size: 8px; color: #2d6b2d; letter-spacing: 0.35em; margin-top: 3px; }
.tabs { display: flex; border-bottom: 1px solid #1a3a1a; background: #070d07; position: sticky; top: 61px; z-index: 10; }
.tab-btn {
  flex: 1; padding: 12px 6px; background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  font-family: 'Share Tech Mono', monospace; color: #2d6b2d; transition: all 0.15s;
}
.tab-btn.active { color: #4ade80; border-bottom-color: #4ade80; }
.panel { padding: 16px 16px 60px; }
.hidden { display: none !important; }
.btn {
  background: #0d2e0d; border: 1px solid #1f5c1f; color: #4ade80;
  padding: 10px 18px; border-radius: 6px; font-family: 'Share Tech Mono', monospace;
  font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s;
}
.btn:hover { background: #1a3a1a; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-ghost { background: none; border-color: #1a3a1a; color: #a3f0a3; }
.section-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  letter-spacing: 0.12em; color: #4ade80; margin-bottom: 12px;
}
.day-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.day-chip {
  padding: 7px 13px; border-radius: 20px; font-size: 11px; cursor: pointer;
  border: 1px solid #1a3a1a; background: #0a1a0a; color: #2d6b2d;
  font-family: 'Share Tech Mono', monospace; transition: all 0.15s;
}
.day-chip.on { background: #0d2e0d; border-color: #4ade80; color: #4ade80; }
.action-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
.workout-card { background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
.wcard-header {
  padding: 14px 16px; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer; border-bottom: 1px solid #1a3a1a;
}
.wcard-header:active { background: #0d2e0d; }
.wcard-day { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.1em; color: #4ade80; }
.wcard-focus { font-size: 11px; color: #a3f0a3; margin-top: 2px; }
.wcard-meta { font-size: 10px; color: #2d6b2d; text-align: right; line-height: 1.6; }
.wcard-body { padding: 14px 16px; }
.superset-label {
  display: inline-block; font-size: 9px; color: #4ade80; letter-spacing: 0.3em;
  background: #0d2e0d; padding: 3px 10px; border-radius: 4px; margin-bottom: 10px;
}
.ex-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1a3a1a; }
.ex-row:last-child { border-bottom: none; }
.ex-emoji { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; margin-top: 2px; }
.ex-name { font-size: 14px; color: #c8f0c8; margin-bottom: 3px; }
.ex-detail { font-size: 11px; color: #2d6b2d; margin-bottom: 5px; letter-spacing: 0.05em; }
.ex-cue { font-size: 12px; color: #a3f0a3; line-height: 1.55; margin-bottom: 8px; }
.ex-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.demo-link {
  font-size: 11px; color: #4ade80; text-decoration: none;
  border: 1px solid #1f5c1f; padding: 3px 9px; border-radius: 4px;
}
.weight-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.w-input {
  width: 58px; background: #0d2e0d; border: 1px solid #1a3a1a;
  color: #c8f0c8; padding: 5px 8px; border-radius: 4px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px; outline: none;
}
.w-input:focus { border-color: #4ade80; }
.w-unit { font-size: 11px; color: #2d6b2d; }
.shuffle-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid #1a3a1a; }
.shuffle-lbl { font-size: 10px; color: #2d6b2d; margin-right: 2px; }
.day-mini {
  padding: 4px 10px; border-radius: 12px; font-size: 10px; cursor: pointer;
  border: 1px solid #1a3a1a; background: #0a1a0a; color: #2d6b2d;
  font-family: 'Share Tech Mono', monospace; transition: all 0.15s;
}
.day-mini.current { border-color: #4ade80; color: #4ade80; background: #0d2e0d; }
.log-btn-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid #1a3a1a; }
.loading-card { background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 10px; padding: 24px; text-align: center; margin-bottom: 14px; }
.dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
.dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: bop 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0);opacity:1}30%{transform:translateY(-8px);opacity:0.4} }
.loading-txt { font-size: 11px; color: #2d6b2d; letter-spacing: 0.15em; }
.empty { text-align: center; padding: 48px 20px; color: #2d6b2d; }
.empty-ico { font-size: 52px; margin-bottom: 14px; }
.empty-h { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.15em; color: #4ade80; margin-bottom: 10px; }
.empty-p { font-size: 13px; line-height: 1.7; max-width: 260px; margin: 0 auto; }
.log-entry { background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 8px; padding: 13px 15px; margin-bottom: 10px; }
.log-date { font-size: 10px; color: #4ade80; letter-spacing: 0.2em; margin-bottom: 5px; }
.log-focus { font-size: 13px; color: #c8f0c8; margin-bottom: 4px; }
.log-weights { font-size: 11px; color: #a3f0a3; line-height: 1.7; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #1f5c1f; border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="logo">GYM SIS</div>
      <div class="logo-sub">PERSONAL TRAINER</div>
    </div>
    <button class="btn btn-sm btn-ghost" onclick="resetAll()">↺ RESET</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="t-program" onclick="showTab('program')">🏋️ PROGRAM</button>
    <button class="tab-btn" id="t-log" onclick="showTab('log')">📋 LOG</button>
  </div>

  <div id="panel-program" class="panel">
    <div class="section-title">THIS WEEK</div>
    <div class="day-chips" id="day-chips"></div>
    <div class="action-row">
      <button class="btn" id="gen-btn" onclick="generateWeek()">⚡ GENERATE WEEK</button>
      <button class="btn btn-sm btn-ghost" id="clear-btn" onclick="clearWorkouts()" style="display:none">CLEAR</button>
    </div>
    <div id="workouts-list"></div>
  </div>

  <div id="panel-log" class="panel hidden">
    <div class="section-title">WORKOUT LOG</div>
    <div id="log-list"></div>
  </div>
</div>

<script>
const API_URL = 'https://gym-sis.vercel.app/api/chat';
const ALL_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MUSCLES = [
  { label:'Lower Body', emoji:'🦵', focus:'Quads, Glutes, Hamstrings' },
  { label:'Push',       emoji:'💪', focus:'Chest, Shoulders, Triceps' },
  { label:'Pull',       emoji:'🔙', focus:'Back, Biceps, Rear Delts' },
  { label:'Lower Body', emoji:'🦵', focus:'Glutes, Hamstrings, Calves' },
  { label:'Full Body',  emoji:'⚡', focus:'Full Body Power & Conditioning' },
];

// ── STATE ──
let state = {
  selectedDays: ['Monday','Wednesday','Friday','Saturday'],
  workouts: {},      // day -> workout object or 'loading'
  weights: {},       // day -> { exName -> { kg, lbs } }
  log: [],           // [{date,day,focus,duration,weights:[]}]
  open: {},          // day -> bool (card expanded)
  assigned: {},      // day -> display day name (for shuffle)
};

function load() {
  try {
    const s = localStorage.getItem('gymsis-state');
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
}
function save() {
  try { localStorage.setItem('gymsis-state', JSON.stringify(state)); } catch(e) {}
}

// ── TABS ──
function showTab(tab) {
  document.getElementById('panel-program').classList.toggle('hidden', tab !== 'program');
  document.getElementById('panel-log').classList.toggle('hidden', tab !== 'log');
  document.getElementById('t-program').classList.toggle('active', tab === 'program');
  document.getElementById('t-log').classList.toggle('active', tab === 'log');
  if (tab === 'log') renderLog();
}

// ── DAY CHIPS ──
function renderDayChips() {
  const el = document.getElementById('day-chips');
  el.innerHTML = ALL_DAYS.map(d => {
    const on = state.selectedDays.includes(d);
    return `<div class="day-chip ${on?'on':''}" onclick="toggleDay('${d}')">${d.slice(0,3)}</div>`;
  }).join('');
}

function toggleDay(day) {
  const idx = state.selectedDays.indexOf(day);
  if (idx >= 0) {
    if (state.selectedDays.length <= 3) return;
    state.selectedDays.splice(idx, 1);
  } else {
    if (state.selectedDays.length >= 6) return;
    state.selectedDays.push(day);
    state.selectedDays.sort((a,b) => ALL_DAYS.indexOf(a) - ALL_DAYS.indexOf(b));
  }
  save();
  renderDayChips();
}

// ── WORKOUTS ──
function getMuscle(i) { return MUSCLES[i % MUSCLES.length]; }

function renderWorkoutsList() {
  const el = document.getElementById('workouts-list');
  const days = state.selectedDays;
  const hasAny = days.some(d => state.workouts[d]);
  document.getElementById('clear-btn').style.display = hasAny ? 'inline-block' : 'none';

  if (!hasAny) {
    el.innerHTML = `<div class="empty">
      <div class="empty-ico">🏋️</div>
      <div class="empty-h">LET'S GET TO WORK</div>
      <div class="empty-p">Pick your training days above, then hit Generate to build your superset program.</div>
    </div>`;
    return;
  }

  el.innerHTML = days.map((day, i) => {
    const w = state.workouts[day];
    const muscle = getMuscle(i);
    if (!w) return '';
    if (w === 'loading') return `
      <div class="loading-card">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="loading-txt">BUILDING ${day.toUpperCase()}...</div>
      </div>`;
    return renderCard(day, w, muscle, i);
  }).join('');
}

function renderCard(day, w, muscle, idx) {
  const isOpen = !!state.open[day];
  const displayDay = state.assigned[day] || day;

  let html = `<div class="workout-card">
    <div class="wcard-header" onclick="toggleCard('${day}')">
      <div>
        <div class="wcard-day">${muscle.emoji} ${displayDay}</div>
        <div class="wcard-focus">${w.focus || muscle.focus}</div>
      </div>
      <div class="wcard-meta">
        ${w.duration || '38'} MIN<br>
        ${(w.supersets||[]).length} SUPERSETS<br>
        <span style="color:#4ade80">${isOpen ? '▲' : '▼'}</span>
      </div>
    </div>`;

  if (isOpen) {
    html += `<div class="wcard-body">`;
    (w.supersets || []).forEach((ss, si) => {
      html += `<div style="margin-bottom:16px">
        <span class="superset-label">⚡ SUPERSET ${si+1}</span>`;
      (ss.exercises || []).forEach(ex => {
        const saved = ((state.weights[day] || {})[ex.name]) || {};
        const wid = (day+'__'+ex.name).replace(/[^a-zA-Z0-9_]/g,'_');
        html += `<div class="ex-row">
          <div class="ex-emoji">${ex.emoji||'💪'}</div>
          <div style="flex:1">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-detail">⏱ ${ex.duration} · ${ex.sets} · ${ex.muscle}</div>
            <div class="ex-cue">${ex.cue}</div>
            <div class="ex-links">
              <a class="demo-link" href="${ex.youtube}" target="_blank">▶ DEMO</a>
            </div>
            <div class="weight-row">
              <input class="w-input" type="number" placeholder="0" step="0.5"
                id="kg-${wid}" value="${saved.kg||''}"
                onchange="setWeight('${day}','${ex.name}','kg',this.value)">
              <span class="w-unit">kg</span>
              <input class="w-input" type="number" placeholder="0" step="1"
                id="lbs-${wid}" value="${saved.lbs||''}"
                onchange="setWeight('${day}','${ex.name}','lbs',this.value)">
              <span class="w-unit">lbs</span>
            </div>
          </div>
        </div>`;
      });
      html += `</div>`;
    });

    // Shuffle
    html += `<div class="shuffle-row">
      <span class="shuffle-lbl">MOVE TO:</span>`;
    ALL_DAYS.forEach(d => {
      const cur = (state.assigned[day]||day) === d;
      html += `<div class="day-mini ${cur?'current':''}" onclick="reassign('${day}','${d}')">${d.slice(0,3)}</div>`;
    });
    html += `</div>`;

    // Log button
    html += `<div class="log-btn-row">
      <button class="btn btn-sm" onclick="logWorkout('${day}')">✓ LOG WORKOUT</button>
    </div>`;

    html += `</div>`; // wcard-body
  }

  html += `</div>`; // workout-card
  return html;
}

function toggleCard(day) {
  state.open[day] = !state.open[day];
  save();
  renderWorkoutsList();
}

function reassign(day, newDay) {
  state.assigned[day] = newDay;
  save();
  renderWorkoutsList();
}

function setWeight(day, exName, unit, val) {
  if (!state.weights[day]) state.weights[day] = {};
  if (!state.weights[day][exName]) state.weights[day][exName] = {};
  const n = parseFloat(val) || 0;
  if (unit === 'kg') {
    state.weights[day][exName].kg = n;
    state.weights[day][exName].lbs = Math.round(n * 2.20462 * 10) / 10;
  } else {
    state.weights[day][exName].lbs = n;
    state.weights[day][exName].kg = Math.round(n / 2.20462 * 10) / 10;
  }
  save();
  // sync other field
  const wid = (day+'__'+exName).replace(/[^a-zA-Z0-9_]/g,'_');
  const other = unit === 'kg' ? 'lbs' : 'kg';
  const otherEl = document.getElementById(other+'-'+wid);
  if (otherEl) otherEl.value = state.weights[day][exName][other] || '';
}

// ── GENERATE ──
async function generateWeek() {
  if (!state.selectedDays.length) return;
  // clear existing
  state.workouts = {};
  state.open = {};
  state.assigned = {};

  // mark all loading
  state.selectedDays.forEach(d => { state.workouts[d] = 'loading'; });
  renderWorkoutsList();

  for (let i = 0; i < state.selectedDays.length; i++) {
    const day = state.selectedDays[i];
    const muscle = getMuscle(i);
    try {
      const w = await callAPI(day, muscle);
      state.workouts[day] = w;
   } catch(e) {
      state.workouts[day] = { focus: e.message || 'Error — see console', supersets: [], duration: '—', _error: true };
    }
    save();
    renderWorkoutsList();
  }
}

async function callAPI(day, muscle) {
  const prompt = `Create a ${muscle.label} strength workout for ${day}.

Rules:
- Focus muscles: ${muscle.focus}  
- Total duration: 35-45 minutes
- Equipment only: dumbbells, kettlebells, bench, stability ball, yoga mat
- Structure: 3-4 supersets, each with 2-3 exercises
- Training style: timed sets (train to failure in time window), NOT counting reps
- Each set: 30-45 seconds work
- Rest is built-in by rotating exercises within the superset

For each exercise include:
- name: exercise name
- muscle: muscles targeted
- emoji: one relevant emoji
- duration: like "40 sec"
- sets: like "3 sets"
- cue: 1-2 sentence practical form tip
- youtube: YouTube search URL like https://www.youtube.com/results?search_query=goblet+squat+tutorial

You MUST respond with ONLY raw JSON. No markdown. No backticks. No code fences. No explanation. Start your response with { and end with }. Example:{
  "focus": "muscle groups",
  "duration": "38",
  "supersets": [
    {
      "exercises": [
        {
          "name": "Exercise Name",
          "muscle": "Quads, Glutes",
          "emoji": "🦵",
          "duration": "40 sec",
          "sets": "3 sets",
          "cue": "Form tip here.",
          "youtube": "https://www.youtube.com/results?search_query=exercise+name+tutorial"
        }
      ]
    }
  ]
}`;

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
  });

  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
if (data.error) throw new Error(JSON.stringify(data));
  const text = data.reply || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON found');
  const w = JSON.parse(match[0]);
  w._open = false;
  return w;
}

function clearWorkouts() {
  state.workouts = {};
  state.open = {};
  state.assigned = {};
  save();
  renderWorkoutsList();
}

// ── LOG ──
function logWorkout(day) {
  const w = state.workouts[day];
  if (!w || w === 'loading') return;
  const weights = state.weights[day] || {};
  const weightLines = Object.entries(weights)
    .map(([n,v]) => v.kg ? `${n}: ${v.kg}kg / ${v.lbs}lbs` : null)
    .filter(Boolean);
  state.log.unshift({
    date: new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),
    day: state.assigned[day] || day,
    focus: w.focus || '',
    duration: w.duration || '—',
    weights: weightLines
  });
  state.log = state.log.slice(0, 100);
  save();
  // feedback
  event.target.textContent = '✓ LOGGED!';
  setTimeout(() => { event.target.textContent = '✓ LOG WORKOUT'; }, 2000);
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!state.log.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-ico">📋</div>
      <div class="empty-h">NO LOGS YET</div>
      <div class="empty-p">Complete a workout and tap Log Workout to track your progress here.</div>
    </div>`;
    return;
  }
  el.innerHTML = state.log.map(e => `
    <div class="log-entry">
      <div class="log-date">${e.date.toUpperCase()} · ${e.duration} MIN</div>
      <div class="log-focus">${e.day} — ${e.focus}</div>
      ${e.weights.length ? `<div class="log-weights">${e.weights.join('<br>')}</div>` : ''}
    </div>
  `).join('');
}

// ── RESET ──
function resetAll() {
  if (!confirm('Reset everything?')) return;
  localStorage.removeItem('gymsis-state');
  state = {
    selectedDays: ['Monday','Wednesday','Friday','Saturday'],
    workouts: {}, weights: {}, log: {}, open: {}, assigned: {}
  };
  init();
}

// ── INIT ──
function init() {
  load();
  renderDayChips();
  renderWorkoutsList();
}

init();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
